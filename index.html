<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KomanDa</title>
    <style>
        /* ===== ОБЩИЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            color: #1a1a1e;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ===== ШАПКА ===== */
        .header {
            text-align: center;
            padding: 30px 0 25px;
            border-bottom: 2px solid #e4e4e7;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #f43f5e, #8b5cf6, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ===== ВКЛАДКИ ===== */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
            border-bottom: 1px solid #e4e4e7;
            padding-bottom: 15px;
        }

        .tab-btn {
            background: #f4f4f5;
            color: #3f3f46;
            border: 1px solid #d4d4d8;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.25s ease;
            white-space: nowrap;
            font-family: inherit;
        }

        .tab-btn:hover {
            background: #e4e4e7;
            color: #18181b;
            border-color: #a1a1aa;
        }

        .tab-btn.active {
            background: #8b5cf6;
            color: white;
            border-color: #8b5cf6;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.2);
        }

        .tab-btn.active:hover {
            background: #7c3aed;
        }

        .tab-badge {
            display: inline-block;
            background: #e4e4e7;
            color: #3f3f46;
            font-size: 10px;
            font-weight: 700;
            padding: 1px 9px;
            border-radius: 20px;
            margin-left: 6px;
        }

        .tab-btn.active .tab-badge {
            background: rgba(255, 255, 255, 0.25);
            color: white;
        }

        /* ===== КОНТЕНТ ===== */
        .tab-content {
            display: none;
            animation: fadeUp 0.35s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== РЕДАКТИРУЕМОЕ ОПИСАНИЕ ДНЯ ===== */
        .day-description {
            background: #f8f8fa;
            border: 1px dashed #d4d4d8;
            border-radius: 14px;
            padding: 18px 22px;
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            gap: 14px;
            transition: 0.3s;
        }

        .day-description:hover {
            border-color: #8b5cf6;
            background: #f4f4f7;
        }

        .day-description .icon {
            font-size: 22px;
            margin-top: 2px;
            flex-shrink: 0;
        }

        .day-description .desc-text {
            flex: 1;
            font-size: 15px;
            line-height: 1.7;
            color: #1a1a1e;
            min-height: 40px;
            outline: none;
            background: transparent;
            border: none;
            font-family: inherit;
            width: 100%;
            padding: 4px 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .day-description .desc-text:focus {
            outline: none;
        }

        .day-description .desc-text:empty::before {
            content: '✏️ Нажмите сюда, чтобы добавить описание дня...';
            color: #a1a1aa;
            font-style: italic;
        }

        .day-description .save-hint {
            font-size: 12px;
            color: #a1a1aa;
            flex-shrink: 0;
            align-self: center;
            opacity: 0;
            transition: 0.3s;
        }

        .day-description:hover .save-hint {
            opacity: 1;
        }

        /* ===== БЛОК "КАРАВАН" ===== */
        .caravan-block {
            background: #f0f0ff;
            border: 2px solid #8b5cf6;
            border-radius: 14px;
            padding: 20px 24px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            align-items: start;
        }

        .caravan-block .caravan-title {
            font-size: 20px;
            font-weight: 700;
            color: #5b21b6;
            display: flex;
            align-items: center;
            gap: 10px;
            grid-column: 1 / -1;
        }

        .caravan-block .caravan-title .icon {
            font-size: 26px;
        }

        .caravan-block .caravan-datetime {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .caravan-block .caravan-datetime label {
            font-size: 13px;
            font-weight: 600;
            color: #3f3f46;
        }

        .caravan-block .caravan-datetime input[type="date"],
        .caravan-block .caravan-datetime input[type="time"] {
            padding: 8px 12px;
            border: 1px solid #d4d4d8;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            background: white;
            color: #1a1a1e;
            outline: none;
            transition: 0.2s;
        }

        .caravan-block .caravan-datetime input:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .caravan-block .caravan-comment {
            grid-column: 1 / -1;
        }

        .caravan-block .caravan-comment label {
            font-size: 13px;
            font-weight: 600;
            color: #3f3f46;
            display: block;
            margin-bottom: 4px;
        }

        .caravan-block .caravan-comment textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d4d4d8;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            background: white;
            color: #1a1a1e;
            outline: none;
            resize: vertical;
            min-height: 60px;
            transition: 0.2s;
        }

        .caravan-block .caravan-comment textarea:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        /* ===== TUMBLR-ПОСТЫ (для особых вкладок) ===== */
        .tumblr-posts {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .tumblr-post {
            background: #ffffff;
            border: 1px solid #e4e4e7;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            transition: 0.3s;
        }

        .tumblr-post:hover {
            border-color: #8b5cf6;
            box-shadow: 0 4px 16px rgba(139, 92, 246, 0.08);
        }

        .tumblr-post .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .tumblr-post .post-header .post-date {
            font-size: 13px;
            color: #71717a;
        }

        .tumblr-post .post-header .btn-delete-post {
            background: transparent;
            border: none;
            color: #a1a1aa;
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
            border-radius: 6px;
            transition: 0.2s;
        }

        .tumblr-post .post-header .btn-delete-post:hover {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.08);
        }

        .tumblr-post .post-content {
            font-size: 15px;
            line-height: 1.8;
            color: #1a1a1e;
            word-wrap: break-word;
        }

        .tumblr-post .post-content img {
            max-width: 100%;
            border-radius: 10px;
            margin: 10px 0;
            border: 1px solid #e4e4e7;
        }

        .tumblr-post .post-content strong,
        .tumblr-post .post-content b {
            font-weight: 700;
        }

        .tumblr-post .post-content em,
        .tumblr-post .post-content i {
            font-style: italic;
        }

        .tumblr-post .post-content u {
            text-decoration: underline;
        }

        .tumblr-post .post-content s {
            text-decoration: line-through;
        }

        .tumblr-post .post-content ul,
        .tumblr-post .post-content ol {
            padding-left: 24px;
            margin: 8px 0;
        }

        .tumblr-post .post-content blockquote {
            border-left: 4px solid #8b5cf6;
            padding-left: 16px;
            margin: 10px 0;
            color: #3f3f46;
            background: #f8f8fa;
            padding: 12px 16px;
            border-radius: 0 8px 8px 0;
        }

        .tumblr-post .post-content h1,
        .tumblr-post .post-content h2,
        .tumblr-post .post-content h3 {
            margin: 12px 0 8px;
        }

        /* Форма создания Tumblr-поста */
        .tumblr-form {
            background: #f8f8fa;
            border: 2px dashed #d4d4d8;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            transition: 0.3s;
        }

        .tumblr-form:hover {
            border-color: #8b5cf6;
        }

        .tumblr-form .form-title {
            font-size: 18px;
            font-weight: 700;
            color: #3f3f46;
            margin-bottom: 16px;
        }

        .tumblr-form .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .tumblr-form .toolbar button {
            background: #f4f4f5;
            border: 1px solid #d4d4d8;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            color: #3f3f46;
            font-family: inherit;
        }

        .tumblr-form .toolbar button:hover {
            background: #e4e4e7;
            border-color: #a1a1aa;
        }

        .tumblr-form .toolbar button.active {
            background: #8b5cf6;
            color: white;
            border-color: #8b5cf6;
        }

        .tumblr-form .tumblr-textarea {
            width: 100%;
            min-height: 150px;
            padding: 14px;
            border: 1px solid #d4d4d8;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            outline: none;
            transition: 0.2s;
            background: white;
            color: #1a1a1e;
            line-height: 1.7;
        }

        .tumblr-form .tumblr-textarea:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .tumblr-form .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .tumblr-form .form-actions .btn-add-post {
            background: #8b5cf6;
            color: white;
            border: none;
            padding: 10px 28px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.25s;
        }

        .tumblr-form .form-actions .btn-add-post:hover {
            background: #7c3aed;
            transform: scale(1.02);
        }

        .tumblr-form .form-actions .btn-insert-image {
            background: #22c55e;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.25s;
        }

        .tumblr-form .form-actions .btn-insert-image:hover {
            background: #16a34a;
        }

        .tumblr-form .image-url-input {
            display: none;
            margin-top: 10px;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .tumblr-form .image-url-input.show {
            display: flex;
        }

        .tumblr-form .image-url-input input {
            flex: 1;
            min-width: 200px;
            padding: 8px 14px;
            border: 1px solid #d4d4d8;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
        }

        .tumblr-form .image-url-input input:focus {
            border-color: #8b5cf6;
        }

        .tumblr-form .image-url-input .btn-insert-img {
            background: #8b5cf6;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .tumblr-form .image-url-input .btn-insert-img:hover {
            background: #7c3aed;
        }

        /* ===== ТАБЛИЦА УВЕДОМЛЕНИЙ ===== */
        .posts-table-wrapper {
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid #e4e4e7;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .posts-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .posts-table thead {
            background: #f8f8fa;
        }

        .posts-table th {
            text-align: left;
            padding: 14px 18px;
            color: #3f3f46;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #e4e4e7;
        }

        .posts-table td {
            padding: 14px 18px;
            border-bottom: 1px solid #f4f4f5;
            color: #1a1a1e;
            vertical-align: middle;
        }

        .posts-table tr:last-child td {
            border-bottom: none;
        }

        .posts-table tr:hover td {
            background: #fafafc;
        }

        .posts-table .post-title {
            font-weight: 600;
            color: #18181b;
        }

        .posts-table .post-date {
            color: #71717a;
            font-size: 12px;
            white-space: nowrap;
        }

        .posts-table .btn-delete {
            background: transparent;
            border: none;
            color: #a1a1aa;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
            border-radius: 6px;
            transition: 0.2s;
        }

        .posts-table .btn-delete:hover {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.08);
        }

        .empty-row td {
            color: #a1a1aa;
            text-align: center;
            padding: 40px 0;
            font-style: italic;
        }

        /* ===== ФОРМА ДОБАВЛЕНИЯ УВЕДОМЛЕНИЯ ===== */
        .add-post-form {
            display: flex;
            gap: 12px;
            padding: 18px 20px;
            background: #fafafc;
            border-top: 1px solid #e4e4e7;
            flex-wrap: wrap;
        }

        .add-post-form input {
            flex: 1;
            min-width: 160px;
            background: #ffffff;
            border: 1px solid #d4d4d8;
            color: #1a1a1e;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: 0.2s;
        }

        .add-post-form input:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .add-post-form input::placeholder {
            color: #a1a1aa;
        }

        .add-post-form .btn-add {
            background: #8b5cf6;
            color: white;
            border: none;
            padding: 10px 28px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.25s;
            white-space: nowrap;
        }

        .add-post-form .btn-add:hover {
            background: #7c3aed;
            transform: scale(1.02);
        }

        /* ===== ВСТАВКА EXCEL (только для дней недели) ===== */
        .excel-table-wrapper {
            background: #ffffff;
            border: 1px solid #e4e4e7;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            overflow: auto;
            min-height: 60px;
        }

        .excel-table-wrapper .empty-excel {
            color: #a1a1aa;
            text-align: center;
            padding: 20px 0;
            font-style: italic;
            font-size: 14px;
        }

        .excel-table-wrapper table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .excel-table-wrapper table th,
        .excel-table-wrapper table td {
            border: 1px solid #d4d4d8;
            padding: 8px 12px;
            text-align: left;
            min-width: 80px;
        }

        .excel-table-wrapper table th {
            background: #f4f4f7;
            font-weight: 600;
            color: #3f3f46;
        }

        .excel-table-wrapper table tr:nth-child(even) {
            background: #fafafc;
        }

        .excel-table-wrapper table tr:hover {
            background: #f0f0ff;
        }

        .excel-table-wrapper .btn-clear-table {
            display: inline-block;
            margin-top: 10px;
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .excel-table-wrapper .btn-clear-table:hover {
            background: #dc2626;
        }

        .btn-insert-excel {
            background: #22c55e;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.25s;
            white-space: nowrap;
        }

        .btn-insert-excel:hover {
            background: #16a34a;
            transform: scale(1.02);
        }

        .btn-insert-excel .icon {
            margin-right: 6px;
        }

        /* ===== МОДАЛЬНОЕ ОКНО ДЛЯ EXCEL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-box {
            background: white;
            border-radius: 16px;
            padding: 30px;
            max-width: 700px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-box h3 {
            font-size: 20px;
            margin-bottom: 12px;
            color: #1a1a1e;
        }

        .modal-box p {
            color: #71717a;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .modal-box textarea {
            width: 100%;
            min-height: 200px;
            padding: 14px;
            border: 2px dashed #d4d4d8;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            resize: vertical;
            outline: none;
            transition: 0.2s;
        }

        .modal-box textarea:focus {
            border-color: #8b5cf6;
        }

        .modal-box .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            justify-content: flex-end;
        }

        .modal-box .modal-buttons button {
            padding: 10px 24px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .modal-box .btn-modal-cancel {
            background: #f4f4f5;
            color: #3f3f46;
        }

        .modal-box .btn-modal-cancel:hover {
            background: #e4e4e7;
        }

        .modal-box .btn-modal-insert {
            background: #22c55e;
            color: white;
        }

        .modal-box .btn-modal-insert:hover {
            background: #16a34a;
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 700px) {
            .header h1 {
                font-size: 32px;
            }

            .tabs {
                gap: 5px;
            }
            .tab-btn {
                font-size: 12px;
                padding: 8px 14px;
            }

            .day-description {
                flex-direction: column;
                gap: 8px;
            }

            .caravan-block {
                grid-template-columns: 1fr;
            }

            .caravan-block .caravan-datetime {
                flex-direction: column;
                align-items: stretch;
            }

            .caravan-block .caravan-datetime input {
                width: 100%;
            }

            .posts-table th,
            .posts-table td {
                padding: 10px 12px;
                font-size: 13px;
            }

            .add-post-form {
                flex-direction: column;
            }
            .add-post-form input {
                min-width: auto;
            }
            .add-post-form .btn-add {
                width: 100%;
            }

            .modal-box {
                padding: 20px;
            }

            .tumblr-form .toolbar {
                gap: 4px;
            }
            .tumblr-form .toolbar button {
                font-size: 12px;
                padding: 4px 10px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .tab-btn {
                font-size: 11px;
                padding: 6px 12px;
            }
            .posts-table-wrapper {
                border-radius: 10px;
            }
            .posts-table th,
            .posts-table td {
                padding: 8px 10px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ===== ШАПКА ===== -->
        <header class="header">
            <h1>KomanDa</h1>
        </header>

        <!-- ===== ВКЛАДКИ ===== -->
        <div class="tabs" id="tabsContainer">
            <!-- Генерируются JS -->
        </div>

        <!-- ===== КОНТЕНТ ===== -->
        <div id="contentContainer">
            <!-- Генерируется JS -->
        </div>

    </div>

    <!-- ===== МОДАЛЬНОЕ ОКНО ДЛЯ EXCEL ===== -->
    <div class="modal-overlay" id="excelModal">
        <div class="modal-box">
            <h3>📊 Вставка таблицы из Excel</h3>
            <p>Скопируйте ячейки из Excel (Ctrl+C) и вставьте их сюда. Таблица будет создана автоматически.</p>
            <textarea id="excelInput" placeholder="Вставьте сюда данные из Excel..."></textarea>
            <div class="modal-buttons">
                <button class="btn-modal-cancel" onclick="closeExcelModal()">Отмена</button>
                <button class="btn-modal-insert" onclick="insertExcelTable()">✅ Вставить таблицу</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 1. НАЗВАНИЯ ВКЛАДОК (10 штук)
        // ============================================================
        const TAB_NAMES = [
            'Понедельник',
            'Вторник',
            'Среда',
            'Четверг',
            'Пятница',
            'Суббота',
            'Воскресенье',
            'Особые События',
            'Инструкции по развитию',
            'Прочие инструкции'
        ];

        const STORAGE_KEY = 'komanDaData';

        // Дни недели (первые 7 вкладок)
        const DAY_TABS = [0, 1, 2, 3, 4, 5, 6];
        // Tumblr-вкладки (последние 3)
        const TUMBLR_TABS = [7, 8, 9];

        // ============================================================
        // 2. РАБОТА С ДАННЫМИ (localStorage)
        // ============================================================
        function getDefaultData() {
            const tabs = TAB_NAMES.map(() => []);
            return {
                descriptions: {},           // { tabIndex: 'текст' }
                caravan: {},                // { tabIndex: { date, time, comment } }
                excelTables: {},            // { tabIndex: 'html-код таблицы' }
                tumblrPosts: {},            // { tabIndex: [ { id, content, date } ] }
                posts: tabs                 // уведомления для дней недели
            };
        }

        function loadData() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) {
                const def = getDefaultData();
                localStorage.setItem(STORAGE_KEY, JSON.stringify(def));
                return def;
            }
            try {
                const data = JSON.parse(raw);
                if (!data.posts || !Array.isArray(data.posts) || data.posts.length !== TAB_NAMES.length) {
                    const def = getDefaultData();
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(def));
                    return def;
                }
                if (!data.descriptions) data.descriptions = {};
                if (!data.caravan) data.caravan = {};
                if (!data.excelTables) data.excelTables = {};
                if (!data.tumblrPosts) data.tumblrPosts = {};
                return data;
            } catch {
                const def = getDefaultData();
                localStorage.setItem(STORAGE_KEY, JSON.stringify(def));
                return def;
            }
        }

        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        // ============================================================
        // 3. УВЕДОМЛЕНИЯ (для дней недели)
        // ============================================================
        function addPost(tabIndex, title) {
            const data = loadData();
            const newPost = {
                id: Date.now() + Math.random() * 1000,
                title: title.trim(),
                date: new Date().toLocaleDateString('ru-RU', {
                    day: 'numeric',
                    month: 'short',
                    hour: '2-digit',
                    minute: '2-digit'
                })
            };
            data.posts[tabIndex].unshift(newPost);
            saveData(data);
            renderAll();
        }

        function deletePost(tabIndex, postId) {
            if (!confirm('Удалить это уведомление?')) return;
            const data = loadData();
            data.posts[tabIndex] = data.posts[tabIndex].filter(p => p.id !== postId);
            saveData(data);
            renderAll();
        }

        // ============================================================
        // 4. ОПИСАНИЕ ДНЯ
        // ============================================================
        function saveDescription(tabIndex, text) {
            const data = loadData();
            data.descriptions[tabIndex] = text;
            saveData(data);
        }

        // ============================================================
        // 5. КАРАВАН (дата, время, комментарий)
        // ============================================================
        function saveCaravan(tabIndex, field, value) {
            const data = loadData();
            if (!data.caravan) data.caravan = {};
            if (!data.caravan[tabIndex]) data.caravan[tabIndex] = { date: '', time: '', comment: '' };
            data.caravan[tabIndex][field] = value;
            saveData(data);
        }

        // ============================================================
        // 6. EXCEL ТАБЛИЦА (только для дней недели)
        // ============================================================
        function saveExcelTable(tabIndex, html) {
            const data = loadData();
            data.excelTables[tabIndex] = html;
            saveData(data);
        }

        function clearExcelTable(tabIndex) {
            if (!confirm('Очистить таблицу?')) return;
            const data = loadData();
            data.excelTables[tabIndex] = '';
            saveData(data);
            renderAll();
        }

        // ============================================================
        // 7. TUMBLR-ПОСТЫ (для особых вкладок)
        // ============================================================
        function addTumblrPost(tabIndex, content) {
            const data = loadData();
            if (!data.tumblrPosts) data.tumblrPosts = {};
            if (!data.tumblrPosts[tabIndex]) data.tumblrPosts[tabIndex] = [];

            const newPost = {
                id: Date.now() + Math.random() * 1000,
                content: content,
                date: new Date().toLocaleDateString('ru-RU', {
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                })
            };
            data.tumblrPosts[tabIndex].unshift(newPost);
            saveData(data);
            renderAll();
        }

        function deleteTumblrPost(tabIndex, postId) {
            if (!confirm('Удалить этот пост?')) return;
            const data = loadData();
            if (data.tumblrPosts && data.tumblrPosts[tabIndex]) {
                data.tumblrPosts[tabIndex] = data.tumblrPosts[tabIndex].filter(p => p.id !== postId);
                saveData(data);
                renderAll();
            }
        }

        // ============================================================
        // 8. МОДАЛЬНОЕ ОКНО ДЛЯ EXCEL
        // ============================================================
        let currentExcelTab = 0;

        function openExcelModal(tabIndex) {
            currentExcelTab = tabIndex;
            document.getElementById('excelModal').classList.add('show');
            document.getElementById('excelInput').value = '';
            document.getElementById('excelInput').focus();
        }

        function closeExcelModal() {
            document.getElementById('excelModal').classList.remove('show');
        }

        function insertExcelTable() {
            const text = document.getElementById('excelInput').value;
            if (!text.trim()) {
                alert('Вставьте данные из Excel!');
                return;
            }

            const rows = text.trim().split('\n').filter(row => row.trim());
            let html = '<table>\n';

            rows.forEach(row => {
                const cells = row.split('\t');
                html += '  <tr>\n';
                cells.forEach(cell => {
                    html += `    <td>${escapeHtml(cell.trim())}</td>\n`;
                });
                html += '  </tr>\n';
            });

            html += '</table>';

            saveExcelTable(currentExcelTab, html);
            closeExcelModal();
            renderAll();

            showNotification('✅ Таблица вставлена!');
        }

        // ============================================================
        // 9. УВЕДОМЛЕНИЯ
        // ============================================================
        function showNotification(msg) {
            const div = document.createElement('div');
            div.style.cssText = `
                position: fixed; bottom: 20px; right: 20px;
                background: #22c55e; color: white;
                padding: 14px 24px; border-radius: 12px;
                font-weight: 600; z-index: 9999;
                box-shadow: 0 4px 20px rgba(0,0,0,0.15);
                animation: fadeUp 0.3s ease;
            `;
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 2500);
        }

        // ============================================================
        // 10. ВСТАВКА ИЗОБРАЖЕНИЙ В TUMBLR
        // ============================================================
        function toggleImageInput() {
            const container = document.getElementById('imageUrlContainer');
            container.classList.toggle('show');
            if (container.classList.contains('show')) {
                document.getElementById('imageUrlInput').focus();
            }
        }

        function insertImageToTumblr() {
            const url = document.getElementById('imageUrlInput').value.trim();
            if (!url) {
                alert('Введите URL изображения!');
                return;
            }
            const textarea = document.getElementById('tumblrTextarea');
            const imgTag = `<img src="${url}" alt="Вставленное изображение">`;
            // Вставляем в позицию курсора
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const text = textarea.value;
            textarea.value = text.substring(0, start) + imgTag + text.substring(end);
            textarea.focus();
            // Устанавливаем курсор после вставленного тега
            const newPos = start + imgTag.length;
            textarea.setSelectionRange(newPos, newPos);
            document.getElementById('imageUrlInput').value = '';
            document.getElementById('imageUrlContainer').classList.remove('show');
        }

        // Вставка форматирования в Tumblr
        function insertTumblrFormat(tag) {
            const textarea = document.getElementById('tumblrTextarea');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const selectedText = textarea.value.substring(start, end);

            let wrappedText;
            if (tag === 'h1') wrappedText = `\n# ${selectedText || 'Заголовок'}\n`;
            else if (tag === 'h2') wrappedText = `\n## ${selectedText || 'Подзаголовок'}\n`;
            else if (tag === 'h3') wrappedText = `\n### ${selectedText || 'Малый заголовок'}\n`;
            else if (tag === 'b') wrappedText = `**${selectedText || 'жирный текст'}**`;
            else if (tag === 'i') wrappedText = `*${selectedText || 'курсив'}*`;
            else if (tag === 'u') wrappedText = `__${selectedText || 'подчёркнутый текст'}__`;
            else if (tag === 's') wrappedText = `~~${selectedText || 'зачёркнутый текст'}~~`;
            else if (tag === 'quote') wrappedText = `\n> ${selectedText || 'цитата'}\n`;
            else if (tag === 'ul') {
                const lines = (selectedText || 'пункт списка').split('\n');
                wrappedText = lines.map(l => `- ${l}`).join('\n');
            } else if (tag === 'ol') {
                const lines = (selectedText || 'пункт списка').split('\n');
                wrappedText = lines.map((l, i) => `${i+1}. ${l}`).join('\n');
            } else {
                wrappedText = selectedText || '';
            }

            const text = textarea.value;
            textarea.value = text.substring(0, start) + wrappedText + text.substring(end);
            textarea.focus();
            const newPos = start + wrappedText.length;
            textarea.setSelectionRange(newPos, newPos);
        }

        function submitTumblrPost(tabIndex) {
            const textarea = document.getElementById('tumblrTextarea');
            const content = textarea.value.trim();
            if (!content) {
                alert('Введите текст поста!');
                return;
            }
            addTumblrPost(tabIndex, content);
            textarea.value = '';
            // Сброс форматирования
            document.querySelectorAll('.toolbar button').forEach(b => b.classList.remove('active'));
        }

        // ============================================================
        // 11. ОТРИСОВКА
        // ============================================================
        let currentTab = 0;

        function renderTabs() {
            const container = document.getElementById('tabsContainer');
            const data = loadData();

            container.innerHTML = TAB_NAMES.map((name, i) => {
                const count = data.posts[i] ? data.posts[i].length : 0;
                const isActive = i === currentTab ? 'active' : '';
                return `
                    <button class="tab-btn ${isActive}" onclick="switchTab(${i})">
                        ${name}
                        <span class="tab-badge">${count}</span>
                    </button>
                `;
            }).join('');
        }

        function renderContent() {
            const container = document.getElementById('contentContainer');
            const data = loadData();
            const isDayTab = DAY_TABS.includes(currentTab);
            const isTumblrTab = TUMBLR_TABS.includes(currentTab);

            let html = `<div class="tab-content active">`;

            if (isDayTab) {
                // ===== ДНИ НЕДЕЛИ =====
                const posts = data.posts[currentTab] || [];
                const desc = data.descriptions[currentTab] || '';
                const caravan = data.caravan[currentTab] || { date: '', time: '', comment: '' };
                const excelHtml = data.excelTables[currentTab] || '';

                // ---- Описание дня ----
                html += `
                    <div class="day-description">
                        <span class="icon">📝</span>
                        <div
                            class="desc-text"
                            contenteditable="true"
                            data-tab="${currentTab}"
                            oninput="onDescriptionInput(this)"
                            onblur="onDescriptionBlur(this)"
                        >${escapeHtml(desc)}</div>
                        <span class="save-hint">💾 сохраняется автоматически</span>
                    </div>
                `;

                // ---- Караван ----
                html += `
                    <div class="caravan-block">
                        <div class="caravan-title">
                            <span class="icon">🐫</span>
                            Караван
                        </div>
                        <div class="caravan-datetime">
                            <div>
                                <label>📅 Дата</label>
                                <input type="date" value="${caravan.date || ''}" onchange="onCaravanChange(${currentTab}, 'date', this.value)">
                            </div>
                            <div>
                                <label>⏰ Время</label>
                                <input type="time" value="${caravan.time || ''}" onchange="onCaravanChange(${currentTab}, 'time', this.value)">
                            </div>
                        </div>
                        <div class="caravan-comment">
                            <label>💬 Комментарий</label>
                            <textarea onchange="onCaravanChange(${currentTab}, 'comment', this.value)">${escapeHtml(caravan.comment || '')}</textarea>
                        </div>
                    </div>
                `;

                // ---- Excel таблица ----
                html += `
                    <div class="excel-table-wrapper" id="excelWrapper_${currentTab}">
                `;

                if (excelHtml) {
                    html += excelHtml;
                    html += `
                        <button class="btn-clear-table" onclick="clearExcelTable(${currentTab})">🗑️ Очистить таблицу</button>
                    `;
                } else {
                    html += `
                        <div class="empty-excel">
                            📊 Нет таблицы. Нажмите кнопку ниже, чтобы вставить из Excel.
                        </div>
                    `;
                }

                html += `
                        <button class="btn-insert-excel" onclick="openExcelModal(${currentTab})" style="margin-top:10px;">
                            <span class="icon">📋</span> Вставить таблицу из Excel
                        </button>
                    </div>
                `;

                // ---- Уведомления ----
                html += `
                    <div class="posts-table-wrapper">
                        <table class="posts-table">
                            <thead>
                                <tr>
                                    <th>🔔 Уведомление</th>
                                    <th style="width:140px;">📅 Дата</th>
                                    <th style="width:80px; text-align:right;">Действие</th>
                                </tr>
                            </thead>
                            <tbody>
                `;

                if (posts.length === 0) {
                    html += `
                        <tr class="empty-row">
                            <td colspan="3">✨ Нет уведомлений. Добавьте первое!</td>
                        </tr>
                    `;
                } else {
                    posts.forEach(post => {
                        html += `
                            <tr>
                                <td class="post-title">${escapeHtml(post.title)}</td>
                                <td class="post-date">${escapeHtml(post.date)}</td>
                                <td style="text-align:right;">
                                    <button class="btn-delete" onclick="deletePost(${currentTab}, ${post.id})" title="Удалить">✕</button>
                                </td>
                            </tr>
                        `;
                    });
                }

                html += `
                            </tbody>
                        </table>

                        <form class="add-post-form" onsubmit="onAddPost(event, ${currentTab})">
                            <input type="text" placeholder="Введите новое уведомление..." required id="newPostInput_${currentTab}">
                            <button type="submit" class="btn-add">➕ Добавить</button>
                        </form>
                    </div>
                `;

            } else if (isTumblrTab) {
                // ===== TUMBLR-ПОСТЫ =====
                const posts = (data.tumblrPosts && data.tumblrPosts[currentTab]) || [];

                // Форма создания поста
                html += `
                    <div class="tumblr-form">
                        <div class="form-title">✏️ Создать новый пост</div>
                        <div class="toolbar">
                            <button onclick="insertTumblrFormat('h1')" title="Заголовок H1">H1</button>
                            <button onclick="insertTumblrFormat('h2')" title="Заголовок H2">H2</button>
                            <button onclick="insertTumblrFormat('h3')" title="Заголовок H3">H3</button>
                            <button onclick="insertTumblrFormat('b')" title="Жирный"><b>B</b></button>
                            <button onclick="insertTumblrFormat('i')" title="Курсив"><i>I</i></button>
                            <button onclick="insertTumblrFormat('u')" title="Подчёркнутый"><u>U</u></button>
                            <button onclick="insertTumblrFormat('s')" title="Зачёркнутый"><s>S</s></button>
                            <button onclick="insertTumblrFormat('quote')" title="Цитата">"</button>
                            <button onclick="insertTumblrFormat('ul')" title="Маркированный список">•</button>
                            <button onclick="insertTumblrFormat('ol')" title="Нумерованный список">1.</button>
                            <button onclick="toggleImageInput()" title="Вставить изображение">🖼️</button>
                        </div>
                        <div class="image-url-input" id="imageUrlContainer">
                            <input type="text" id="imageUrlInput" placeholder="Введите URL изображения...">
                            <button class="btn-insert-img" onclick="insertImageToTumblr()">Вставить</button>
                        </div>
                        <textarea class="tumblr-textarea" id="tumblrTextarea" placeholder="Напишите что-нибудь..."></textarea>
                        <div class="form-actions">
                            <button class="btn-add-post" onclick="submitTumblrPost(${currentTab})">📤 Опубликовать</button>
                        </div>
                    </div>
                `;

                // Список постов
                html += `<div class="tumblr-posts">`;

                if (posts.length === 0) {
                    html += `
                        <div style="text-align:center; padding:40px 0; color:#a1a1aa; font-style:italic;">
                            📭 Нет постов. Создайте первый!
                        </div>
                    `;
                } else {
                    posts.forEach(post => {
                        // Преобразуем Markdown-подобный текст в HTML
                        let content = post.content;
                        // Заголовки
                        content = content.replace(/^# (.+)$/gm, '<h1>$1</h1>');
                        content = content.replace(/^## (.+)$/gm, '<h2>$1</h2>');
                        content = content.replace(/^### (.+)$/gm, '<h3>$1</h3>');
                        // Жирный
                        content = content.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                        // Курсив
                        content = content.replace(/\*(.+?)\*/g, '<em>$1</em>');
                        // Подчёркнутый
                        content = content.replace(/__(.+?)__/g, '<u>$1</u>');
                        // Зачёркнутый
                        content = content.replace(/~~(.+?)~~/g, '<s>$1</s>');
                        // Цитаты
                        content = content.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
                        // Списки (маркированные)
                        content = content.replace(/^- (.+)$/gm, '<li>$1</li>');
                        // Списки (нумерованные)
                        content = content.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
                        // Переносы строк в <br>
                        content = content.replace(/\n/g, '<br>');

                        html += `
                            <div class="tumblr-post">
                                <div class="post-header">
                                    <span class="post-date">📅 ${escapeHtml(post.date)}</span>
                                    <button class="btn-delete-post" onclick="deleteTumblrPost(${currentTab}, ${post.id})" title="Удалить">✕</button>
                                </div>
                                <div class="post-content">${content}</div>
                            </div>
                        `;
                    });
                }

                html += `</div>`;
            }

            html += `</div>`;
            container.innerHTML = html;

            // Для Tumblr: фокус на textarea
            if (isTumblrTab) {
                setTimeout(() => {
                    const ta = document.getElementById('tumblrTextarea');
                    if (ta) ta.focus();
                }, 100);
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderAll() {
            renderTabs();
            renderContent();
        }

        // ============================================================
        // 12. ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
        // ============================================================
        function switchTab(index) {
            currentTab = index;
            renderAll();
            if (DAY_TABS.includes(index)) {
                setTimeout(() => {
                    const input = document.getElementById(`newPostInput_${index}`);
                    if (input) input.focus();
                }, 100);
            }
        }

        // ============================================================
        // 13. ОБРАБОТЧИКИ
        // ============================================================
        function onAddPost(e, tabIndex) {
            e.preventDefault();
            const input = document.getElementById(`newPostInput_${tabIndex}`);
            const title = input.value.trim();
            if (!title) return;
            addPost(tabIndex, title);
            setTimeout(() => input.focus(), 50);
        }

        // Описание дня
        let descriptionTimeout = null;

        function onDescriptionInput(el) {
            clearTimeout(descriptionTimeout);
        }

        function onDescriptionBlur(el) {
            const tabIndex = parseInt(el.dataset.tab);
            const text = el.innerText;
            saveDescription(tabIndex, text);
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.target.classList.contains('desc-text')) {
                // Разрешаем перенос строки
                document.execCommand('insertLineBreak');
                e.preventDefault();
            }
        });

        // Караван
        function onCaravanChange(tabIndex, field, value) {
            saveCaravan(tabIndex, field, value);
        }

        // Закрытие модалки по Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeExcelModal();
        });

        document.getElementById('excelModal').addEventListener('click', function(e) {
            if (e.target === this) closeExcelModal();
        });

        // ============================================================
        // 14. ПЕРВОНАЧАЛЬНЫЙ ЗАПУСК
        // ============================================================
        (function init() {
            const data = loadData();
            if (data.posts[0].length === 0) {
                // Пример для понедельника
                data.posts[0] = [
                    { id: Date.now() + 1, title: 'Созвониться с командой в 10:00', date: '15 июл, 10:00' },
                    { id: Date.now() + 2, title: 'Завершить отчёт по проекту', date: '15 июл, 14:30' },
                ];
                data.descriptions[0] = 'Сегодня важный день! Не забываем про дедлайн в 18:00.';
                data.caravan[0] = { date: '2026-07-15', time: '09:30', comment: 'Встреча у центральных ворот' };
                saveData(data);
            }
            renderAll();
        })();
    </script>

</body>
</html>
